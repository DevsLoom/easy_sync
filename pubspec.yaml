name: easy_sync
description: Flutter sync orchestration for app-open, manual, and background flows with retry, preconditions, and task state tracking.
version: 0.2.0
homepage: https://github.com/DevsLoom/easy_sync
repository: https://github.com/DevsLoom/easy_sync
issue_tracker: https://github.com/DevsLoom/easy_sync/issues
documentation: https://github.com/DevsLoom/easy_sync#readme
topics:
  - flutter
  - synchronization
  - background-tasks
  - offline-first
  - workmanager

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.6'

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0
  workmanager: ^0.9.0+3

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.2
